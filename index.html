<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./assets/css/style.css">
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>
  <article class="card">
    <img class="blog-image" src="./assets/images/illustration-article.svg" alt="">
    <div class="content">
      <span class="content-category">
        Learning
      </span>
      <p class="content-date">Published 21 Dec 2023</p>
      <a class="content-title" href="#">HTML & CSS foundations</a>
      <p class="content-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <figure class="author">
      <img class="author-image" src="./assets/images/image-avatar.webp" alt="">
      <figcaption class="author-name">
        Greg Hooper
      </figcaption>
    </figure>
  </article>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
